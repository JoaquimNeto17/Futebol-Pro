<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página não encontrada | Scout Brasil</title>
    <link rel="icon" type="image/x-icon" href="/static/img/logo.png">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .error-box {
            text-align: center;
            padding: 60px 20px;
            max-width: 600px;
            margin: 40px auto;
            background: var(--white);
            border: 2px solid var(--black);
        }
        
        .error-code {
            font-size: 80px;
            font-weight: bold;
            color: var(--brazil-green);
            margin-bottom: 20px;
        }
        
        .error-message {
            font-size: 24px;
            margin-bottom: 30px;
            color: var(--black);
        }
        
        .error-text {
            color: var(--gray-600);
            margin-bottom: 30px;
        }
        
        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--black);
            color: var(--white);
            text-decoration: none;
            border: 2px solid var(--black);
            transition: 0.3s;
            font-weight: 500;
        }
        
        .back-btn:hover {
            background: transparent;
            color: var(--black);
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>SCOUT BRASIL</h1>
        <p>Times Série A e B</p>
    </header>

    <div class="container">
        <div class="error-box">
            <div class="error-code">404</div>
            <div class="error-message">⚽ Página não encontrada</div>
            <div class="error-text">
                A página que você procura não existe ou foi removida.
            </div>
            <a href="/" class="back-btn">VOLTAR AO INÍCIO</a>
        </div>
    </div>

    <footer class="footer">
        <p>Desenvolvido por Joaquim</p>
    </footer>
</body>
</html>
